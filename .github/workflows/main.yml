name: Build & Deploy Portfolio
# 触发条件：main分支推送、PR
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 部署权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 允许使用不受支持的Node版本，消除安全版本校验报错
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Node.js 20（适配VitePress）
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 缓存依赖，加速构建

      - name: 安装依赖
        run: npm install

      - name: 打包静态页面
        run: npm run build

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
